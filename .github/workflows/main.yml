# .github/workflows/update-manifest-on-release.yml
name: Update manifest version on release

on:
  release:
    types: [published]

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json
        run: |
          jq '.version = "${{ github.event.release.tag_name }}"' \
            custom_components/samsungtv_smart/manifest.json > tmp.json
          mv tmp.json custom_components/samsungtv_smart/manifest.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/samsungtv_smart/manifest.json
          git diff --staged --quiet || git commit -m "chore: bump manifest version to ${{ github.event.release.tag_name }}"
          git push
