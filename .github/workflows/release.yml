name: "Release"

on:
  release:
    types:
      - "published"

permissions:
  contents: write

jobs:
  detect-branch:
    name: "Detect target branch from release type"
    runs-on: ubuntu-latest
    outputs:
      target_branch: ${{ steps.detect.outputs.branch }}
    steps:
      - name: "Determine target branch"
        id: detect
        run: |
          # Stable releases target master.
          # Pre-releases (betas, rc) target the dev branch matching their
          # version line: 8.0.x -> v8-json-rpc, 8.1.x -> v8.1-dev, etc.
          # The branch is derived from the tag's major.minor so new dev
          # lines (8.2, ...) keep working without editing this workflow,
          # as long as the branch is named v<major>.<minor>-dev.
          TAG="${{ github.event.release.tag_name }}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          if [[ "$IS_PRERELEASE" != "true" ]]; then
            BRANCH="master"
          elif [[ "$TAG" =~ ^8\.0\.0 ]]; then
            # The 8.0 line predates the v<maj>.<min>-dev convention.
            BRANCH="v8-json-rpc"
          elif [[ "$TAG" =~ ^([0-9]+)\.([0-9]+)\. ]]; then
            BRANCH="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}-dev"
          else
            echo "::error::Cannot derive a dev branch from tag '$TAG'"
            exit 1
          fi
          echo "Release tag: $TAG (prerelease=$IS_PRERELEASE) -> target branch: $BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  update-manifest:
    name: "Update manifest version"
    runs-on: ubuntu-latest
    needs: detect-branch
    steps:
      - name: "Checkout target branch"
        uses: actions/checkout@v4
        with:
          ref: refs/heads/${{ needs.detect-branch.outputs.target_branch }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "Update manifest.json"
        run: |
          jq '.version = "${{ github.event.release.tag_name }}"' \
            custom_components/samsungtv_smart/manifest.json > tmp.json
          mv tmp.json custom_components/samsungtv_smart/manifest.json
      - name: "Commit and push"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/samsungtv_smart/manifest.json
          git diff --staged --quiet || \
            git commit -m "chore: bump manifest version to ${{ github.event.release.tag_name }}"
          git push origin refs/heads/${{ needs.detect-branch.outputs.target_branch }}

  release:
    name: "Release"
    runs-on: ubuntu-latest
    needs: [detect-branch, update-manifest]
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@v4
        with:
          ref: refs/heads/${{ needs.detect-branch.outputs.target_branch }}
      - name: "Set manifest version from tag (authoritative)"
        # Force the version inside the artifact to match the release tag,
        # independent of the update-manifest push having propagated.
        # This is what makes the zip's version reliably correct.
        run: |
          jq '.version = "${{ github.event.release.tag_name }}"' \
            custom_components/samsungtv_smart/manifest.json > tmp.json
          mv tmp.json custom_components/samsungtv_smart/manifest.json
          echo "manifest version is now:"
          jq -r '.version' custom_components/samsungtv_smart/manifest.json
      - name: "ZIP the integration directory"
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components/samsungtv_smart"
          zip samsungtv_smart.zip -r ./
      - name: "Upload the ZIP file to the release"
        uses: softprops/action-gh-release@v2.0.8
        with:
          files: ${{ github.workspace }}/custom_components/samsungtv_smart/samsungtv_smart.zip
