# ============================================
# Frame Art Gallery - Folder Gallery Card
# ============================================
# This example uses the folder-gallery-card
# custom Lovelace card for a cleaner,
# more performant gallery experience.
#
# v7 NOTES:
#  - The card is BUNDLED with the integration and auto-registered as a
#    Lovelace resource at /api/samsungtv_smart/folder-gallery-card.js.
#    No manual copy to /config/www/community/ and no resource entry needed.
#    (If it doesn't appear, restart Home Assistant once.)
#  - The integration AUTO-CREATES folder sensors per TV
#    (sensor.<tv_name>_personal / _store / _other), each with a `file_list`
#    attribute. You can point the card straight at them with `folder_sensor:`
#    and skip the template sensors entirely. Example:
#
#      - type: custom:folder-gallery-card
#        title: "📷 My Personal Photos"
#        folder_sensor: sensor.samsung_frame_personal
#        folder: /local/frame_art/YOUR_ENTRY_ID/personal
#        columns: 4
#
#  - Thumbnail paths are now per-TV: /local/frame_art/{entry_id}/...
#    Find {entry_id} on the sensor.<tv_name>_frame_art entity.
#
# The dashboard below keeps the template-sensor approach (using `sensor:`)
# as one valid option; the `folder_sensor:` approach above is simpler in v7.
# ============================================

# ============================================
# RESOURCE CONFIGURATION (legacy / manual installs only)
# ============================================
# Not required in v7 — the card auto-registers. Only needed if you install
# the card manually outside the integration:
#
# lovelace:
#   resources:
#     - url: /local/community/folder-gallery-card/folder-gallery-card.js
#       type: module

# ============================================
# COMPLETE DASHBOARD
# ============================================

title: Frame Art Gallery
icon: mdi:image-frame
path: frame-art-gallery

cards:
  # ============================================
  # STATUS & CONTROLS
  # ============================================
  
  - type: vertical-stack
    cards:
      # Current Artwork Display
      - type: picture-entity
        entity: media_player.samsung_frame_tv
        name: Current Artwork
        show_state: false
        tap_action:
          action: none
      
      # Frame TV Status
      - type: entities
        title: Frame TV Status
        entities:
          - entity: sensor.samsung_frame_art
            name: Art Mode
            icon: mdi:palette
          - entity: sensor.samsung_frame_art
            type: attribute
            attribute: current_content_id
            name: Current Artwork ID
          - entity: sensor.samsung_frame_art
            type: attribute
            attribute: matte_id
            name: Current Matte
          - entity: sensor.samsung_frame_art
            type: attribute
            attribute: brightness
            name: Brightness

      # Quick Controls
      - type: horizontal-stack
        cards:
          - type: button
            name: Art Mode
            icon: mdi:palette
            tap_action:
              action: call-service
              service: samsungtv_smart.set_art_mode
              target:
                entity_id: media_player.samsung_frame_tv
          
          - type: button
            name: Random
            icon: mdi:shuffle
            tap_action:
              action: call-service
              service: script.frame_art_random_favorite
          
          - type: button
            name: Refresh
            icon: mdi:refresh
            tap_action:
              action: call-service
              service: samsungtv_smart.art_available
              target:
                entity_id: media_player.samsung_frame_tv
          
          - type: button
            name: Bright
            icon: mdi:brightness-7
            tap_action:
              action: call-service
              service: samsungtv_smart.art_set_brightness
              target:
                entity_id: media_player.samsung_frame_tv
              data:
                brightness: 80
          
          - type: button
            name: Dim
            icon: mdi:brightness-4
            tap_action:
              action: call-service
              service: samsungtv_smart.art_set_brightness
              target:
                entity_id: media_player.samsung_frame_tv
              data:
                brightness: 30

  # ============================================
  # PERSONAL PHOTOS GALLERY
  # ============================================
  
  - type: custom:folder-gallery-card
    title: "📷 My Personal Photos"
    sensor: sensor.frame_art_personal_gallery
    columns: 4
    image_height: 180px
    gap: 10px
    border_radius: 12px
    show_filename: true
    tap_action: lightbox  # Click to open lightbox
    hold_action:  # Long press to display on TV
      service: samsungtv_smart.art_select_image
      target:
        entity_id: media_player.samsung_frame_tv
      data:
        content_id: "{{content_id}}"
        show: true

  # ============================================
  # ART STORE GALLERY
  # ============================================
  
  - type: custom:folder-gallery-card
    title: "🎨 Samsung Art Store"
    sensor: sensor.frame_art_store_gallery
    columns: 5
    image_height: 150px
    gap: 8px
    border_radius: 10px
    show_filename: false
    tap_action: action  # Click to display directly
    action:
      service: samsungtv_smart.art_select_image
      target:
        entity_id: media_player.samsung_frame_tv
      data:
        content_id: "{{content_id}}"
        show: true

  # ============================================
  # FAVORITES GALLERY
  # ============================================
  
  - type: custom:folder-gallery-card
    title: "⭐ Favorite Artwork"
    sensor: sensor.frame_art_favorites_gallery
    columns: 4
    image_height: 160px
    gap: 10px
    border_radius: 12px
    show_filename: true
    tap_action: action
    action:
      service: samsungtv_smart.art_select_image
      target:
        entity_id: media_player.samsung_frame_tv
      data:
        content_id: "{{content_id}}"
        show: true

  # ============================================
  # THUMBNAIL MANAGEMENT
  # ============================================
  
  - type: entities
    title: Thumbnail Management
    entities:
      - entity: sensor.www_frame_art_personal
        name: Personal Photos Downloaded
        icon: mdi:folder-image
      
      - entity: sensor.www_frame_art_store
        name: Art Store Images Downloaded
        icon: mdi:folder-image
      
      - type: button
        name: Download All Thumbnails
        icon: mdi:download
        action_name: Download
        tap_action:
          action: call-service
          service: script.frame_art_download_all
      
      - type: button
        name: Download Personal Only
        icon: mdi:account-image
        action_name: Download
        tap_action:
          action: call-service
          service: script.frame_art_download_personal
      
      - type: button
        name: Download Favorites
        icon: mdi:star-box
        action_name: Download
        tap_action:
          action: call-service
          service: script.frame_art_download_favorites

