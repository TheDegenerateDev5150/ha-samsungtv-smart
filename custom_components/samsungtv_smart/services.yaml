select_picture_mode:
  name: Select Picture Mode
  description: Send to samsung TV the command to change picture mode.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    picture_mode:
      name: Picture Mode
      description: Name of the picture mode to switch to. Possible options
        can be found in the picture_mode_list state attribute.
      required: true
      example: "Standard"
      selector:
        text:

# Frame Art Extended Services

art_get_artmode:
  name: Get Art Mode Status
  description: Get the current Art Mode status from Samsung Frame TV.
  target:
    entity:
      integration: samsungtv_smart

art_set_artmode:
  name: Set Art Mode Status
  description: Enable or disable Art Mode on Samsung Frame TV.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    enabled:
      name: Enabled
      description: True to enable Art Mode, False to disable
      required: true
      example: true
      selector:
        boolean:

art_available:
  name: Get Available Artwork
  description: Get list of all available artwork on the Samsung Frame TV.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    category_id:
      name: Category ID
      description: Optional category filter (MY-C0002 for My Photos, MY-C0004 for Favorites)
      required: false
      example: "MY-C0002"
      selector:
        text:

art_get_current:
  name: Get Current Artwork
  description: Get information about the currently displayed artwork.
  target:
    entity:
      integration: samsungtv_smart

art_select_image:
  name: Select Artwork
  description: Select and display a specific piece of artwork.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    content_id:
      name: Content ID
      description: The content ID of the artwork (e.g., SAM-F0206, MY-F0001)
      required: true
      example: "SAM-F0206"
      selector:
        text:
    category_id:
      name: Category ID
      description: Optional category ID
      required: false
      selector:
        text:
    show:
      name: Show Immediately
      description: If true, immediately display the artwork
      required: false
      default: true
      selector:
        boolean:

art_upload:
  name: Upload Artwork
  description: Upload an image file to the Samsung Frame TV.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    file_path:
      name: File Path
      description: Path to the image file to upload
      required: true
      example: "/config/www/my_art.jpg"
      selector:
        text:
    matte_id:
      name: Matte Style
      description: "Matte style (format: type_color, e.g., modern_apricot, shadowbox_polar)"
      required: false
      default: "shadowbox_polar"
      example: "modern_apricot"
      selector:
        text:
    file_type:
      name: File Type
      description: Image file type (png or jpg)
      required: false
      default: "jpg"
      selector:
        select:
          options:
            - "jpg"
            - "png"

art_upload_batch:
  name: Batch Upload Artwork
  description: >-
    Upload every image (jpg/png) in a folder to the Frame TV. Re-running the
    same folder uploads only new/changed files (a hidden per-folder sidecar
    tracks what was uploaded), and uploads are throttled so large batches don't
    fail partway through. Returns the uploaded content_ids (use a response
    variable).
  target:
    entity:
      integration: samsungtv_smart
  fields:
    folder:
      name: Folder
      description: Absolute path to the folder of images to upload.
      required: true
      example: "/config/www/frame_upload"
      selector:
        text:
    matte_id:
      name: Matte Style
      description: "Matte style (format: type_color, e.g., modern_apricot, shadowbox_polar)."
      required: false
      default: "shadowbox_polar"
      example: "modern_apricot"
      selector:
        text:
    throttle:
      name: Throttle (seconds)
      description: Delay between uploads. Large batches fail without spacing.
      required: false
      default: 2.0
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: s
    skip_unchanged:
      name: Skip unchanged files
      description: Skip files already uploaded and unchanged since the last run.
      required: false
      default: true
      selector:
        boolean:
    dedup:
      name: Skip perceptual duplicates
      description: >-
        Also skip a file that visually matches art already on the TV (compared
        against the downloaded thumbnails). Strict match to avoid false skips.
        Requires thumbnails to have been downloaded first.
      required: false
      default: false
      selector:
        boolean:

art_delete:
  name: Delete Artwork
  description: Delete an uploaded artwork from the TV. Only user-uploaded content (MY-* or MY_*) can be deleted.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    content_id:
      name: Content ID
      description: The content ID to delete (must start with MY- or MY_)
      required: true
      example: "MY-F0001"
      selector:
        text:

art_get_thumbnail:
  name: Get Artwork Thumbnail
  description: Download the thumbnail image for a specific piece of artwork. Thumbnails are saved to /config/www/frame_art/ in organized subdirectories (personal/, store/, other/). Skips if file already exists unless Force Download is enabled. Works with all image types including Samsung Art Store.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    content_id:
      name: Content ID
      description: The content ID of the artwork (e.g., MY_F0001 for personal photos, SAM-S* for Art Store)
      required: true
      example: "MY_F0001"
      selector:
        text:
    force_download:
      name: Force Download
      description: Re-download even if file already exists
      required: false
      default: false
      selector:
        boolean:

art_get_thumbnails_batch:
  name: Batch Download Artwork Thumbnails
  description: Download thumbnails for multiple artworks at once. Automatically organizes into /config/www/frame_art/personal/, /store/, /other/. Skips files that already exist (unless Force Download is enabled). All image types supported equally - NO DRM assumptions! Perfect for Lovelace galleries.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    category_id:
      name: Category ID
      description: Optional category filter (MY-C0002=My Photos, MY-C0004=Favorites, MY-C0008=All). Leave empty for all artworks.
      required: false
      example: "MY-C0002"
      selector:
        text:
    favorites_only:
      name: Favorites Only
      description: Enable to download ONLY favorited artworks (leave OFF for all artworks)
      required: false
      default: false
      selector:
        boolean:
    personal_only:
      name: Personal Photos Only
      description: Enable to download ONLY your uploaded photos (leave OFF for all artworks)
      required: false
      default: false
      selector:
        boolean:
    force_download:
      name: Force Download
      description: Re-download files even if they already exist (normally skipped to save time)
      required: false
      default: false
      selector:
        boolean:

art_set_brightness:
  name: Set Art Mode Brightness
  description: Set the brightness level for Art Mode display. Input 0-100 is converted to TV's 1-10 scale.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    brightness:
      name: Brightness
      description: Brightness level (0-100, converted to TV's 1-10 scale)
      required: true
      example: 50
      selector:
        number:
          min: 0
          max: 100
          step: 10

art_get_brightness:
  name: Get Art Mode Brightness
  description: Get the current brightness level for Art Mode display. Returns both TV scale (1-10) and UI scale (0-100).
  target:
    entity:
      integration: samsungtv_smart

art_set_color_temperature:
  name: Set Art Mode Color Temperature
  description: Set the color temperature for Art Mode display. Range -5 to +5 (negative = warmer, 0 = neutral, positive = cooler).
  target:
    entity:
      integration: samsungtv_smart
  fields:
    color_temperature:
      name: Color Temperature
      description: Color temperature value (-5 = warmest, 0 = neutral, +5 = coolest)
      required: true
      example: 0
      selector:
        number:
          min: -5
          max: 5
          step: 1

art_get_color_temperature:
  name: Get Art Mode Color Temperature
  description: Get the current color temperature for Art Mode display.
  target:
    entity:
      integration: samsungtv_smart

art_change_matte:
  name: Change Artwork Matte
  description: Change the matte/frame style for a piece of artwork.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    content_id:
      name: Content ID
      description: The content ID of the artwork
      required: true
      selector:
        text:
    matte_id:
      name: Matte ID
      description: "Matte style ID (format: type_color). Types: none, modernthin, modern, modernwide, flexible, shadowbox, panoramic, triptych, mix, squares. Colors: black, neutral, antique, warm, polar, sand, seafoam, sage, burgandy, navy, apricot, byzantine, lavender, redorange, skyblue, turquoise"
      required: true
      example: "modern_apricot"
      selector:
        text:

art_set_photo_filter:
  name: Set Photo Filter
  description: Apply a photo filter effect to artwork.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    content_id:
      name: Content ID
      description: The content ID of the artwork
      required: true
      selector:
        text:
    filter_id:
      name: Filter ID
      description: Filter name to apply
      required: true
      example: "ink"
      selector:
        select:
          options:
            - "none"
            - "mono"
            - "original"
            - "ink"
            - "watercolor"
            - "oil"
            - "pastel"
            - "posterize"
            - "noir"
            - "quartertone"

art_get_photo_filter_list:
  name: Get Photo Filter List
  description: Get list of available photo filters.
  target:
    entity:
      integration: samsungtv_smart

art_get_matte_list:
  name: Get Matte List
  description: Get list of available matte styles.
  target:
    entity:
      integration: samsungtv_smart

art_set_favourite:
  name: Set Favourite Status
  description: Add or remove artwork from favourites.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    content_id:
      name: Content ID
      description: The content ID of the artwork
      required: true
      selector:
        text:
    status:
      name: Status
      description: "'on' to add to favourites, 'off' to remove"
      required: true
      default: "on"
      selector:
        select:
          options:
            - "on"
            - "off"

art_set_slideshow:
  name: Set Slideshow
  description: Configure artwork slideshow settings.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    duration:
      name: Duration
      description: >-
        Rotation interval. Pick a preset or enter a custom value
        (e.g. "30", "30min", "180") if your Frame model supports
        durations outside the presets.
      required: true
      example: "15min"
      selector:
        select:
          custom_value: true
          options:
            - label: "3 minutes"
              value: "3min"
            - label: "15 minutes"
              value: "15min"
            - label: "1 hour"
              value: "1h"
            - label: "12 hours"
              value: "12h"
            - label: "1 day"
              value: "1d"
            - label: "7 days"
              value: "7d"
    shuffle:
      name: Shuffle
      description: Enable shuffle mode
      required: false
      default: true
      selector:
        boolean:
    category_id:
      name: Category
      description: Category number (2=My Photos, 4=Favorites, 8=Store)
      required: false
      default: 2
      selector:
        number:
          min: 2
          max: 8
          step: 2

art_set_auto_rotation:
  name: Set Auto Rotation
  description: >-
    Configure automatic artwork rotation. Functionally identical to
    art_set_slideshow — both service names are aliases that target the
    Frame TV's artwork rotation feature; the integration routes the
    request to whichever underlying Samsung API the TV responds to.
  target:
    entity:
      integration: samsungtv_smart
  fields:
    duration:
      name: Duration
      description: >-
        Rotation interval. Pick a preset or enter a custom value
        (e.g. "30", "30min", "180") if your Frame model supports
        durations outside the presets.
      required: true
      example: "1h"
      selector:
        select:
          custom_value: true
          options:
            - label: "3 minutes"
              value: "3min"
            - label: "15 minutes"
              value: "15min"
            - label: "1 hour"
              value: "1h"
            - label: "12 hours"
              value: "12h"
            - label: "1 day"
              value: "1d"
            - label: "7 days"
              value: "7d"
    shuffle:
      name: Shuffle
      description: Enable shuffle mode
      required: false
      default: true
      selector:
        boolean:
    category_id:
      name: Category
      description: Category number (2=My Photos, 4=Favorites, 8=Store)
      required: false
      default: 2
      selector:
        number:
          min: 2
          max: 8
          step: 2

